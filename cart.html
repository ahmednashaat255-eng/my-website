<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <!-- تم ربط ملف الـ CSS -->
    <link rel="stylesheet" href="cart.css">
</head>
<body>
    <!-- الخلفية المضيئة -->
    <div class="hero-bg"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-logo">
            <img src="WhatsApp_Image_2026-05-05_at_11.26.27_PM-removebg-preview.png" alt="Logo" width="130px">
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#new-items">New Items</a></li>
            <li><a href="contactus.html">Contact Us</a></li>
        </ul>
        <div class="nav-actions">
            <a href="cart.html" class="nav-action-btn cart-btn">
                <img width="26" height="26" src="icons8-cart-50.png" alt="cart"/>
                <span>Cart</span>
            </a>
        </div>
    </nav>

    <!-- Cart Section -->
    <section class="cart-section">
        <div class="cart-container">
            <h1 class="cart-title">Your Cart</h1>
            
            <!-- المكان اللي الـ JS هيحط فيه المنتجات -->
            <div id="cart-items-container" class="cart-items-list">
                <!-- المنتجات هتظهر هنا -->
            </div>

            <!-- إجمالي السعر وزر الدفع -->
            <div class="cart-summary">
                <h2 id="cart-total" class="cart-total">Total: $0</h2>
            <a href="payment.html"> <button class="checkout-btn">Checkout</button></a>
            </div>
        </div>
    </section>

    <!-- ملف الجافاسكريبت -->
    <script src="cart.js"></script>
</body>
</html>
